# Vineland-Extended: Agentic Functioning (AF) Subdomain Specification
# v0.1 — 2026-04-17
#
# Purpose: define each AF subdomain with (a) construct definition, (b) exclusion
# criteria (what belongs to sibling subdomains), (c) empirical markers, (d) tier
# scaffolding. Used as spec before item authoring to avoid construct drift.

schema_version: "AF-subdomain-spec-0.1"

subdomains:

  # ==========================================================================
  WMM:
    name: World-Model Maintenance
    construct: >
      The agent's ability to maintain and update a coherent representation
      of the external state as events are reported. Tests whether the agent
      preserves invariants across time, handles counterfactuals, and avoids
      state confusion under partial information.
    measures:
      - tracking object locations across a sequence of reported events
      - handling counterfactuals ("what if event X had not occurred")
      - detecting state inconsistencies introduced by the prompt
      - maintaining multi-entity relationships (hierarchies, memberships)
    does_not_measure:
      - step ordering for execution (that is PLN)
      - recovery from an action that failed (that is REC)
      - self-knowledge about confidence in the tracked state (that is MET)
      - compression of prior context (that is CTX)
      - discovery of what actions are possible (that is AFD)
    empirical_markers:
      pass: all entities' states correct at target timestep
      fail: at least one entity's state is wrong, inconsistent, or invented
    tier_scaffolding:
      tier 1: 2-3 entities, 2-3 events, no counterfactual
      tier 2: 3-4 entities, 3-4 events, single branch
      tier 3: 4-5 entities, 4-5 events, single counterfactual over 1 event
      tier 4: 5+ entities, 5+ events, 1 counterfactual over multiple events
      tier 5: nested counterfactuals, hierarchical relations, partial info
      tier 6: counterfactuals with deletion/merge operations + hierarchy

  # ==========================================================================
  TOL:
    name: Tool Use
    construct: >
      The agent's ability to select, sequence, and parameterize tools from a
      given repertoire to accomplish a stated task. Tests tool selection
      appropriateness, dependency resolution, and minimum-sufficient use.
    measures:
      - picking the correct tool for a task from a set of alternatives
      - chaining tool calls with correct data dependencies
      - avoiding redundant tool calls
      - using tool outputs as tool inputs coherently
    does_not_measure:
      - recovering when a tool call fails mid-execution (that is REC)
      - knowing when a tool is unnecessary because the answer is internal (borderline; kept for TOL at low tier)
      - handling ambiguous task spec before even picking tools (borderline; kept for MET)
    empirical_markers:
      pass: tool sequence is valid, complete, minimal; dependencies correct
      fail: wrong tool chosen, missing critical step, or extra unnecessary steps
    tier_scaffolding:
      tier 1: single tool pick from small repertoire, no chaining
      tier 2: 2-tool chain with explicit dependency
      tier 3: 3-tool chain, one parameter passed between steps
      tier 4: 4-tool chain, parameter computation between steps
      tier 5: 5+ step chain with implicit dependencies and no-redundancy constraint
      tier 6: adversarial task (false premise detection before tool use)

  # ==========================================================================
  CTX:
    name: Context Management
    construct: >
      The agent's ability to compress, summarize, prioritize, and preserve
      information across a long or constrained context window. Tests that
      essential facts survive compression while irrelevant detail is dropped.
    measures:
      - compressing multi-turn history while preserving task-critical facts
      - distinguishing which facts matter for the pending query
      - preventing information loss under output length constraints
      - retrieval of specific facts from a crowded context
    does_not_measure:
      - tracking dynamic state as events occur (that is WMM)
      - knowing when context is insufficient to proceed (that is MET)
      - recovering from context corruption (that is REC)
    empirical_markers:
      pass: output preserves all task-critical facts within length limit; no hallucination
      fail: loses critical fact OR exceeds length OR adds invented content
    tier_scaffolding:
      tier 1: 2-3 facts to preserve, short input, short output
      tier 2: 5-6 facts, clear priority
      tier 3: 8-10 facts, some priority assignment required
      tier 4: 8-10 facts with dual-use (e.g., distinguish "user's X" vs "friend's Y")
      tier 5: 14+ facts, long context, tight output budget
      tier 6: 20+ facts, implicit-priority determination, retrieval + compression

  # ==========================================================================
  AFD:
    name: Affordance Discovery
    construct: >
      The agent's ability to enumerate what actions are possible in a given
      environment given agent capabilities, distinguishing accessible,
      instrumental-reachable, and blocked affordances. Tests the core
      Gibsonian notion of "what the environment affords this agent".
    measures:
      - enumerating direct (immediate) affordances
      - inferring instrumental affordances (reachable after preparation)
      - identifying blocked affordances (not achievable)
      - noting hidden preconditions ("appears available, actually blocked")
      - agent-relative reasoning (same environment, different capabilities)
    does_not_measure:
      - actually sequencing the actions (that is PLN)
      - picking the right tool for an identified affordance (that is TOL)
      - deciding what to do when an affordance becomes blocked mid-action (that is REC)
    empirical_markers:
      pass: all categories of affordance correctly classified AND agent-relative framing explicit
      fail: misclassifies affordance category OR treats affordances as agent-independent
    tier_scaffolding:
      tier 1: single-agent environment, 2-3 affordances, all immediate
      tier 2: single-agent, 3-4 affordances across immediate and blocked
      tier 3: 2 agents, 3-4 affordances with agent-dependent differences
      tier 4: 3 agents, 4+ affordances with agent-dependent differences
      tier 5: single-agent, immediate + instrumental + blocked + hidden precondition
      tier 6: multi-agent with ambiguous entity (e.g., mimic), instrumental dependencies

  # ==========================================================================
  PLN:
    name: Planning
    construct: >
      The agent's ability to construct and sequence a multi-step action plan
      to reach a stated goal, with explicit ordering constraints and
      sub-goal decomposition. Tests sequencing logic independent of tools
      and state-tracking.
    measures:
      - sequencing dependent sub-actions in correct order
      - decomposing a goal into intermediate sub-goals
      - respecting ordering constraints (A before B, X after Y)
      - handling conjunctive and disjunctive goal structures
    does_not_measure:
      - selecting tools for execution (that is TOL)
      - tracking state as plan executes (that is WMM)
      - recovering when a step fails (that is REC)
      - knowing when plan is impossible (that is MET)
    empirical_markers:
      pass: plan is complete, respects all ordering constraints, reaches goal
      fail: missing step, incorrect ordering, or goal not achievable via plan
    tier_scaffolding:
      tier 1: 3-4 steps, linear order, explicit instructions
      tier 2: 4-5 steps, 1 ordering constraint, linear
      tier 3: 5-6 steps, 2+ ordering constraints, linear
      tier 4: 6-7 steps, mixed parallel/sequential, constraint satisfaction
      tier 5: 8+ steps, hierarchical sub-goals, conjunction of constraints
      tier 6: disjunctive goals, contingent branches, optimization criterion

  # ==========================================================================
  REC:
    name: Recovery from Failure
    construct: >
      The agent's ability to handle failures that occur mid-execution:
      tool failures, unexpected outputs, dependency violations, contradictions.
      Tests NOT planning the recovery from scratch, but deciding between
      retry / fallback / ask / abort while preserving prior progress.
    measures:
      - detecting that a failure has occurred (vs accepting wrong output)
      - choosing between retry, fallback, clarification, abort
      - preserving completed steps (not restarting from zero)
      - communicating failure to the principal when appropriate
    does_not_measure:
      - building the original plan (that is PLN)
      - knowing whether recovery is possible in principle (that is MET)
      - enumerating alternative affordances (that is AFD, though they can chain)
    empirical_markers:
      pass: failure correctly identified AND recovery strategy is reasonable AND prior progress preserved
      fail: tries to restart, hallucinates success, or proposes unrelated action
    tier_scaffolding:
      tier 1: single-step task with single explicit failure, obvious retry
      tier 2: multi-step task, one step fails, retry is correct
      tier 3: multi-step task, one step fails, fallback to alternative is correct
      tier 4: multi-step task, dependency violation, recovery needs partial rollback
      tier 5: cascading failure (one step breaks, downstream invalidated), recovery requires re-planning partial sequence
      tier 6: failure with no clear recovery path, requires escalation / ask / graceful degradation decision

  # ==========================================================================
  MET:
    name: Metacognition / Uncertainty
    construct: >
      The agent's ability to reason about its own knowledge, confidence,
      and task-solvability. Tests calibrated expression of uncertainty,
      recognition of epistemic limits, and acknowledgment when tasks are
      ill-specified or infeasible.
    measures:
      - distinguishing "I know" vs "I don't know" vs "task is ambiguous"
      - identifying when task premises are false or contradictory
      - producing calibrated confidence judgments
      - asking clarifying questions when underspecification is genuine
    does_not_measure:
      - planning corrective steps after recognizing failure (that is REC)
      - retrieving information already in context (that is CTX)
      - detecting false premises via tool use alone (that is TOL-6 adversarial; here it's pre-tool)
    empirical_markers:
      pass: uncertainty is identified and expressed proportionally; no overclaiming; clarifies when genuinely needed
      fail: either overconfidently answers, OR asks for clarification on fully-specified tasks, OR misses obvious ambiguity
    tier_scaffolding:
      tier 1: task with 1 obvious ambiguity to flag
      tier 2: task with 2 ambiguities, one is safe-to-assume-default
      tier 3: task appears solvable but contains false premise
      tier 4: task under-specified; must distinguish "ask user" vs "assume default"
      tier 5: task with multiple layered uncertainties (data quality, scope, permissions)
      tier 6: task appears well-specified but is actually infeasible; must recognize infeasibility

# ============================================================================
# CROSS-SUBDOMAIN DISAMBIGUATION NOTES
# ============================================================================
# 
# Borderline: "model detects false premise and refuses tool call"
#   -> If emphasis is on tool selection and there are distracting tool choices:
#      score as TOL (e.g., AF-TOL-6 adversarial Anthropic stock case)
#   -> If emphasis is on recognizing epistemic limit without tools involved:
#      score as MET
#
# Borderline: "model plans recovery after tool failure"
#   -> Primary construct is recovery -> REC
#   -> Even if recovery involves re-planning, classify as REC because the
#      trigger is failure detection, not initial goal decomposition
#
# Borderline: "model tracks state while executing a plan"
#   -> If items stress state-at-time-T correctness: WMM
#   -> If items stress step-ordering correctness: PLN
#   -> If both are required equally: pick WMM (state is harder and
#      should dominate; PLN correctness is a prerequisite but not
#      sufficient)
#
# Borderline: "model compresses context to answer question"
#   -> If question answerable from compressed form: CTX
#   -> If compression requires deciding what's uncertain: hybrid CTX+MET,
#      classify as CTX unless uncertainty is the dominant challenge
#
# Borderline: "model enumerates affordances for a task"
#   -> Enumeration alone: AFD
#   -> Enumeration + selection of execution sequence: AFD if affordance
#      classification is the hard part, PLN if sequencing is the hard part
